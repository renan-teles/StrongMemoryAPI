spring.application.name=StrongMemoryAPI

# Hibernate Dialect:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Driver:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Credentials and URL:
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/strong_memory_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=60000

# JPA e Hibernate:
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

#JWT:
jwt.secret=${JWT_SECRET_KEY:Jwt&Secret&Key&Strong&Memory&Application&123&Acb}
jwt.expiration-ms=3600000

#LOGS
logging.file.name=logs/app.log

# CACHE:
# spring.cache.type=
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}